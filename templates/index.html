<!DOCTYPE html>
<html lang="ru" scheme="space_gray" class="fs_height">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NektoMe AI - Анонимный чат с AI</title>
    <meta name="theme-color" content="#4d657f">
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="night_theme">
    <nav class="navbar navbar-fixed-top no_select_text">
        <div class="container">
            <a class="navbar-brand"><span>Nekto.</span>me</a>
            <ul class="nav navbar-nav float_right">
                <li class="sel"><a href="/">Чат</a></li>
            </ul>
        </div>
    </nav>

    <div class="app" style="margin-top:50px;">
        <div class="container chat_container">
            <div class="row">
                <div class="chat-box col-xs-12 col-sm-12 col-md-8 col-lg-6" id="chat_box" style="min-height:500px;">
                    <div class="header_chat" id="headerChat">
                        <div class="st_chatbox" id="headerChatMode">
                            <div class="left_block_hc">
                                <h1 class="no_h1"><span class="weight_txt">Онлайн чат</span> Nekto.me</h1>
                            </div>
                            <div class="right_block_hc"></div>
                        </div>
                        <div class="st_chatbox" id="headerSearchMode" style="display:none;">
                            <div class="left_block_hc">
                                <span class="weight_txt">Анонимный чат</span> с <span class="who_chat" id="partnerName">Nekto</span>
                            </div>
                            <div class="right_block_hc main_chat_but" style="display:none;"></div>
                        </div>
                    </div>

                    <!-- SEARCH STEP -->
                    <div class="row step_chatbox main_step" id="searchStep">
                        <div class="col-lg-12">
                            <div class="topicRow row">
                                <div class="col-xs-4 col-sm-4 col-md-4 col-lg-4">
                                    <label class="lb_search no_select_text">Тема общения:</label>
                                    <div class="btn-group">
                                        <button class="btn btnradio btn-default checked" data-topic="chat">Общение</button>
                                    </div>
                                </div>
                                <div class="col-xs-4 col-sm-4 col-md-4 col-lg-4">
                                    <label class="lb_search no_select_text">&nbsp;</label>
                                    <div class="btn-group">
                                        <button class="btn btnradio btn-default" data-topic="flirt">Флирт 18+</button>
                                    </div>
                                </div>
                                <div class="col-xs-4 col-sm-4 col-md-4 col-lg-4">
                                    <label class="lb_search no_select_text">&nbsp;</label>
                                    <div class="btn-group">
                                        <button class="btn btnradio btn-default" data-topic="rp">Ролка</button>
                                    </div>
                                </div>
                            </div>

                            <div class="sexRow row">
                                <div class="col-xs-6 col-sm-6 col-md-6 col-lg-6 threeBtns">
                                    <label class="lb_search">Ваш пол:</label>
                                    <div class="btn-group">
                                        <button class="btn btnradio btn-default checked" data-gender="any">Некто</button>
                                        <button class="btn btnradio btn-default" data-gender="M">М</button>
                                        <button class="btn btnradio btn-default" data-gender="Ж">Ж</button>
                                    </div>
                                </div>
                                <div class="col-xs-6 col-sm-6 col-md-6 col-lg-6 wishSex threeBtns">
                                    <label class="lb_search">Пол собеседника:</label>
                                    <div class="btn-group">
                                        <button class="btn btnradio btn-default checked" data-partner="any">Не важно</button>
                                        <button class="btn btnradio btn-default" data-partner="М">М</button>
                                        <button class="btn btnradio btn-default" data-partner="Ж">Ж</button>
                                    </div>
                                </div>
                            </div>

                            <div class="row row-search">
                                <div class="col-xs-6 col-sm-6 col-md-6 col-lg-6">
                                    <label class="lb_search">Ваш возраст:</label>
                                    <div class="s-age">
                                        <button class="btn btnradio btn-default" data-age="teen">до 17 лет</button>
                                        <button class="btn btnradio btn-default checked" data-age="young">от 18 до 21 года</button>
                                        <button class="btn btnradio btn-default" data-age="adult">от 22 до 35 лет</button>
                                        <button class="btn btnradio btn-default" data-age="mature">старше 36 лет</button>
                                    </div>
                                </div>
                                <div class="col-xs-6 col-sm-6 col-md-6 col-lg-6">
                                    <label class="lb_search">Возраст собеседника:</label>
                                    <div class="s-age">
                                        <button class="btn btncheck btn-default" data-age="teen">до 17 лет</button>
                                        <button class="btn btncheck btn-default checked" data-age="young">от 18 до 21 года</button>
                                        <button class="btn btncheck btn-default checked" data-age="adult">от 22 до 35 лет</button>
                                        <button class="btn btncheck btn-default checked" data-age="mature">старше 36 лет</button>
                                    </div>
                                    <div class="hint" style="font-size:11px;color:var(--night-chat-message-time-color);margin-top:3px;">Можно несколько</div>
                                </div>
                            </div>

                            <div class="row search_btn_row" style="text-align:center;">
                                <div class="col-lg-12" style="padding-top:25px;">
                                    <button id="searchCompanyBtn" class="btn btn-lg btn-my2">Начать поиск</button>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-12 footer_search" style="font-size:16px;">
                                    <div style="margin-top:4px;margin-bottom:10px;">Найди свою половинку!</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- CHARACTER CARD STEP -->
                    <div class="row step_chatbox char_step" id="charCardStep" style="display:none;">
                        <div class="col-lg-12" style="padding:15px;">
                            <div class="char-card-header" style="text-align:center;margin-bottom:15px;">
                                <div class="char-avatar" id="charAvatar" style="width:80px;height:80px;border-radius:50%;background:#3c6286;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:32px;color:white;font-weight:bold;"></div>
                                <h2 style="margin:0;font-size:20px;color:var(--night-text-color);" id="charNameTitle"></h2>
                                <div style="font-size:13px;color:var(--night-chat-message-time-color);" id="charSubtitle"></div>
                            </div>

                            <div class="char-tags" id="charTags" style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:15px;"></div>

                            <div class="char-sections" id="charSections">
                                <div class="char-section">
                                    <div class="char-section-title" onclick="toggleSection(this)">📖 О себе <span class="toggle-arrow">▼</span></div>
                                    <div class="char-section-body"><div id="charAbout"></div></div>
                                </div>
                                <div class="char-section">
                                    <div class="char-section-title" onclick="toggleSection(this)">👤 Внешность <span class="toggle-arrow">▼</span></div>
                                    <div class="char-section-body"><div id="charAppearance"></div></div>
                                </div>
                                <div class="char-section">
                                    <div class="char-section-title" onclick="toggleSection(this)">🧠 Психология <span class="toggle-arrow">▼</span></div>
                                    <div class="char-section-body"><div id="charPsychology"></div></div>
                                </div>
                                <div class="char-section">
                                    <div class="char-section-title" onclick="toggleSection(this)">🎭 Характер <span class="toggle-arrow">▼</span></div>
                                    <div class="char-section-body"><div id="charPersonality"></div></div>
                                </div>
                                <div class="char-section">
                                    <div class="char-section-title" onclick="toggleSection(this)">💭 Интересы <span class="toggle-arrow">▼</span></div>
                                    <div class="char-section-body"><div id="charInterests"></div></div>
                                </div>
                                <div class="char-section">
                                    <div class="char-section-title" onclick="toggleSection(this)">📜 Предыстория <span class="toggle-arrow">▼</span></div>
                                    <div class="char-section-body"><div id="charBackstory"></div></div>
                                </div>
                            </div>

                            <div style="text-align:center;margin-top:15px;">
                                <button id="charStartChatBtn" class="btn btn-lg btn-my2" style="width:80%;">Начать общение</button>
                                <button id="charRegenerateBtn" class="btn btn-lg" style="width:80%;margin-top:8px;background:transparent;border:2px solid var(--night-button-change-params-color);color:var(--night-button-change-params-color);border-radius:50px;font-weight:bold;cursor:pointer;padding:10px 16px;">Новый собеседник</button>
                            </div>
                        </div>
                    </div>

                    <!-- CHAT STEP -->
                    <div class="row step_chatbox chat_step" id="chatStep" style="display:none;">
                        <div class="col-lg-12" style="padding-left:0;padding-right:0;">
                            <div class="window_chat_block" id="chat_messages">
                                <div class="window_chat_dialog_write" id="typing_indicator" style="display:none;">
                                    <span>Собеседник печатает...</span>
                                </div>
                            </div>
                            <div class="window_chat_message">
                                <div class="row" style="margin:0;">
                                    <div class="col-xs-10 crutch_col_11" style="padding-right:0;">
                                        <div class="box_message message_box_2">
                                            <div class="emojionearea">
                                                <div class="emojionearea-editor" id="message_input" contenteditable="true" placeholder="Введите сообщение..."></div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-xs-2 col-sm-1" style="padding-left:0;text-align:center;">
                                        <div class="smile_panel_button_send">
                                            <button id="sendMessageBtn" class="send_btn_circle" disabled>
                                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                                    <line x1="22" y1="2" x2="11" y2="13"></line>
                                                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                                </svg>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="talk_over" id="talk_over" style="display:none;">
                                <div class="talk_over_text">
                                    Собеседник отключился. <span>Пожаловаться</span>
                                </div>
                                <div class="talk_over_button_block">
                                    <button class="talk_over_button" id="newChatBtn">Новый собеседник</button>
                                    <button class="talk_over_button blue_bg" id="changeParamsBtn">Изменить параметры поиска</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="horizontal_adv_container" style="display:none;"></div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru" scheme="space_gray" class="fs_height">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NektoMe AI - Анонимный чат с AI</title>
    <meta name="theme-color" content="#4d657f">
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="night_theme">
    <nav class="navbar navbar-fixed-top no_select_text">
        <div class="container">
            <a class="navbar-brand"><span>Nekto.</span>me</a>
            <ul class="nav navbar-nav float_right">
                <li class="sel"><a href="/">Чат</a></li>
            </ul>
        </div>
    </nav>

    <div class="app" style="margin-top:50px;">
        <div class="container tabs_type_chats" style="height:30px;background:#4d657f;padding-left:0;padding-right:0;display:none;">
            <div id="tabs_t_chats" style="float:left;line-height:32px;font-size:16px;color:black;width:50%;height:100%;text-align:center;border-radius:0 4px 0 0;background:white;">
                <span class="glyphicon glyphicon-pencil" style="font-size:12px;width:12px;"></span> Случайный чат
            </div>
            <div style="cursor:pointer;float:right;line-height:27px;height:100%;font-size:16px;color:white;width:50%;text-align:center;">
                Голосовой чат
            </div>
        </div>

        <div class="container chat_container">
            <div class="row">
                <div class="chat-box col-xs-12 col-sm-12 col-md-8 col-lg-6" id="chat_box" style="min-height:500px;">
                <div class="header_chat" id="headerChat">
                    <div class="st_chatbox no_select_text" id="headerChatMode">
                        <div class="left_block_hc">
                            <h1 class="no_h1"><span class="weight_txt">Онлайн чат</span> Nekto.me</h1>
                        </div>
                        <div class="right_block_hc no_select_text"></div>
                    </div>
                    <div class="st_chatbox" id="headerSearchMode" style="display:none;">
                        <div class="left_block_hc no_select_text">
                            <span class="weight_txt">Анонимный чат</span> с <span class="who_chat">Nekto</span>
                        </div>
                        <div class="right_block_hc main_chat_but" style="display:none;"></div>
                    </div>
                </div>

                <div class="row step_chatbox load_init_step no_select_text" style="margin-right:0;display:none;">
                    <img height="44" align="absmiddle" src="data:image/gif;base64,R0lGODlhQABIAPAAAAAAAP///yH5BAEAAAEALAAAAABAAEgAAAL/jI+py+0Po5zU2tzrMZj7zmAojiRpnmiqrmzrvnAsz3Rt33iu73zv/8CgcEgsGo/IpHLJbDqf0Kh0Sq1ar9isdsvter/gsHhMLpvP6LR6zW673/C4fE6v2+/4vH7P7/v/gIGCg4SFhoeIiYqLjI2Oj5CRkpOUlZaXmJmam5ydnp+goaKjpKWmp6ipqqusra6vsLGys7S1gisIADs=">
                    <span style="display:none;">Подключение...</span>
                    <span style="display:none;">Загрузка...</span>
                </div>

                <div class="row step_chatbox main_step no_select_text">
                    <div class="col-lg-12">
                        <div class="topicRow row">
                            <div class="col-xs-4 col-sm-4 col-md-4 col-lg-4">
                                <label class="lb_search no_select_text">Тема общения:</label>
                                <div class="btn-group">
                                    <button class="btn btnradio btn-default checked">Общение</button>
                                </div>
                            </div>
                            <div class="col-xs-4 col-sm-4 col-md-4 col-lg-4">
                                <label class="lb_search no_select_text">&nbsp;</label>
                                <div class="btn-group">
                                    <button class="btn btnradio btn-default">Флирт 18+</button>
                                </div>
                            </div>
                            <div class="col-xs-4 col-sm-4 col-md-4 col-lg-4">
                                <label class="lb_search no_select_text">&nbsp;</label>
                                <div class="btn-group">
                                    <button class="btn btnradio btn-default">Ролка</button>
                                </div>
                            </div>
                        </div>

                        <div class="sexRow row">
                            <div class="col-xs-6 col-sm-6 col-md-6 col-lg-6 threeBtns">
                                <label class="lb_search no_select_text">Ваш пол:</label>
                                <div class="btn-group">
                                    <button class="btn btnradio btn-default checked">Некто</button>
                                    <button class="btn btnradio btn-default">М</button>
                                    <button class="btn btnradio btn-default">Ж</button>
                                </div>
                            </div>
                            <div class="col-xs-6 col-sm-6 col-md-6 col-lg-6 wishSex threeBtns">
                                <label class="lb_search no_select_text">Пол собеседника:</label>
                                <div class="btn-group">
                                    <button class="btn btnradio btn-default checked">Не важно</button>
                                    <button class="btn btnradio btn-default">М</button>
                                    <button class="btn btnradio btn-default">Ж</button>
                                </div>
                            </div>
                        </div>

                        <div class="row row-search">
                            <div class="col-xs-6 col-sm-6 col-md-6 col-lg-6">
                                <label class="lb_search no_select_text">Ваш возраст:</label>
                                <div class="s-age">
                                    <button class="btn btnradio btn-default">до 17 лет</button>
                                    <button class="btn btnradio btn-default checked">от 18 до 21 года</button>
                                    <button class="btn btnradio btn-default">от 22 до 25 лет</button>
                                    <button class="btn btnradio btn-default">от 26 до 35 лет</button>
                                    <button class="btn btnradio btn-default">старше 36 лет</button>
                                </div>
                            </div>
                            <div class="col-xs-6 col-sm-6 col-md-6 col-lg-6">
                                <label class="lb_search no_select_text">Возраст собеседника:</label>
                                <div class="s-age">
                                    <button class="btn btncheck btn-default">до 17 лет</button>
                                    <button class="btn btncheck btn-default checked">от 18 до 21 года</button>
                                    <button class="btn btncheck btn-default checked">от 22 до 25 лет</button>
                                    <button class="btn btncheck btn-default checked">от 26 до 35 лет</button>
                                    <button class="btn btncheck btn-default checked">старше 36 лет</button>
                                </div>
                                <div class="hint" style="font-size:11px;color:var(--night-chat-message-time-color);margin-top:3px;">Можно несколько</div>
                            </div>
                        </div>

                        <div class="row colorRow">
                            <div class="col-xs-6 col-sm-6 col-md-6 col-lg-6">
                                <label class="lb_search no_select_text">Цветовая схема:</label>
                                <div class="btn-group">
                                    <button class="btn btnradio btn-default">Светлая</button>
                                </div>
                            </div>
                            <div class="col-xs-6 col-sm-6 col-md-6 col-lg-6">
                                <label class="lb_search no_select_text">&nbsp;</label>
                                <div class="btn-group">
                                    <button class="btn btnradio btn-default checked">Тёмная</button>
                                </div>
                            </div>
                        </div>

                        <div class="row search_btn_row" style="text-align:center;">
                            <div class="col-lg-12" style="padding-top:25px;">
                                <button id="searchCompanyBtn" class="btn btn-lg btn-my2">Начать поиск</button>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-12 footer_search no_select_text" style="font-size:16px;">
                                Онлайн сейчас: <span id="onlineCount">0 собеседников</span><br>
                                <div style="margin-top:4px;margin-bottom:10px;">Найди свою половинку!</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row step_chatbox chat_step no_select_text" style="display:none;">
                    <div class="col-lg-12" style="padding-left:0;padding-right:0;">
                        <div class="window_chat_block" id="chat_messages">
                            <div class="window_chat_dialog_write" id="typing_indicator" style="display:none;">
                                <span>Собеседник печатает...</span>
                            </div>
                        </div>
                        <div class="window_chat_message">
                            <div class="row" style="margin:0;">
                                <div class="col-xs-10 crutch_col_11" style="padding-right:0;">
                                    <div class="box_message message_box_2">
                                        <div class="emojionearea">
                                            <div class="emojionearea-editor" id="message_input" contenteditable="true" placeholder="Введите сообщение..."></div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-xs-2 col-sm-1" style="padding-left:0;text-align:center;">
                                    <div class="smile_panel_button_send">
                                        <button id="sendMessageBtn" class="send_btn_circle" disabled>
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="talk_over" id="talk_over" style="display:none;">
                            <div class="talk_over_text">
                                Собеседник отключился. <span>Пожаловаться</span>
                            </div>
                            <div class="talk_over_button_block">
                                <button class="talk_over_button" id="newChatBtn">Новый собеседник</button>
                                <button class="talk_over_button blue_bg" id="changeParamsBtn">Изменить параметры поиска</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

                <div class="horizontal_adv_container" style="display:none;"></div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
